<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | Spring-vibe'">Spring-vibe</title>
    <link rel="stylesheet" th:href="@{/css/layout_app.css}" />
    <link rel="stylesheet" th:href="@{/css/chat.css}" />
    <script th:src="@{/js/chat.js}" defer></script>
</head>
  <body>
    <div class="layout">
      <aside class="sidebar" aria-label="Sidebar">
        <div class="side-top">
          <div class="brand">
            <div class="mark" aria-hidden="true"></div>
            <div>
              <h1>Spring-vibe</h1>
<!--              <p>Admin console (sample UI)</p>-->
            </div>
          </div>
<!--          <div class="user">-->
<!--            <div class="name" th:text="${#authentication?.name}">user</div>-->
<!--            <div class="meta">Signed in</div>-->
<!--          </div>-->
        </div>

        <nav class="nav" aria-label="Menu">
          <div class="nav-empty" th:if="${#lists.isEmpty(leftMenus)}">
            No menus assigned
          </div>

          <div class="nav-tools">
            <button id="chatOpen" class="nav-btn nav-btn-chat" type="button" aria-haspopup="dialog" aria-controls="chatModal">
              <span class="nav-btn-ico" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M7 18.5C4.24 17.23 2.5 14.83 2.5 12C2.5 7.86 6.31 4.5 12 4.5C17.69 4.5 21.5 7.86 21.5 12C21.5 16.14 17.69 19.5 12 19.5C10.94 19.5 9.93 19.38 9 19.16L6.1 20.5C5.62 20.72 5.09 20.29 5.2 19.78L5.7 17.38C6.14 17.82 6.6 18.19 7 18.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                  <path d="M8.3 11.8H8.31M12 11.8H12.01M15.7 11.8H15.71" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="nav-btn-text">
                <span class="nav-btn-title">AI Chat</span>
              </span>
              <span class="nav-btn-pill" aria-hidden="true">NEW</span>
            </button>
          </div>

          <th:block th:each="m : ${leftMenus}">
            <a
              th:if="${m.path != null}"
              th:href="${m.path}"
              th:classappend="${currentPath != null and currentPath.startsWith(m.path)} ? ' active' : ''"
            >
              <span class="dot" aria-hidden="true"></span>
              <span th:text="${m.menuName}">Menu</span>
            </a>
            <a
              th:if="${m.path == null}"
              href="#"
              onclick="return false;"
            >
              <span class="dot" aria-hidden="true"></span>
              <span th:text="${m.menuName}">Menu</span>
            </a>

            <th:block th:each="c : ${m.children}">
              <a
                class="sub"
                th:if="${c.path != null}"
                th:href="${c.path}"
                th:classappend="${currentPath != null and currentPath.startsWith(c.path)} ? ' active' : ''"
              >
                <span class="dot" aria-hidden="true"></span>
                <span th:text="${c.menuName}">Sub menu</span>
              </a>
              <a
                class="sub"
                th:if="${c.path == null}"
                href="#"
                onclick="return false;"
              >
                <span class="dot" aria-hidden="true"></span>
                <span th:text="${c.menuName}">Sub menu</span>
              </a>
            </th:block>
          </th:block>
        </nav>

        <div class="side-bottom">
          <form th:action="@{/logout}" method="post">
            <button class="btn" type="submit">Logout</button>
          </form>
        </div>
      </aside>

      <main class="main" aria-label="Content">
        <header class="topbar">
          <div>
            <h2 th:text="${pageTitle}">Dashboard</h2>
            <p>Layout is shared, content changes by route.</p>
          </div>
          <div class="muted">
            Auth: <strong th:text="${#authentication?.name}">user</strong>
          </div>
        </header>

        <section class="content">
          <th:block th:replace="${contentTemplate} :: content"></th:block>
        </section>
      </main>
    </div>

    <!-- Chat modal (Ollama) -->
    <div id="chatModal" class="chat-modal" hidden>
      <div id="chatBackdrop" class="chat-backdrop" aria-hidden="true"></div>
      <div class="chat-dialog chat-phone" role="dialog" aria-modal="true" aria-label="Chatbot dialog">
        <div class="chat-dialog-head">
          <div>
            <div class="chat-dialog-title">AI Chat</div>
            <div id="chatHealth" class="chat-health muted">Checking Ollama...</div>
          </div>
          <div class="chat-dialog-actions">
            <button id="chatClear" class="btn btn-inline" type="button">Clear</button>
            <button id="chatClose" class="btn btn-inline" type="button">Close</button>
          </div>
        </div>

        <div id="chatLog" class="chat-log" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <div class="field chat-input">
            <div class="label">Message</div>
            <div class="chat-compose-row">
              <textarea id="chatMessage" class="input" rows="3" placeholder="메시지를 입력하세요 (Ctrl+Enter 보내기)" autocomplete="off"></textarea>
              <button id="chatSend" class="btn btn-inline btn-primary" type="submit">보내기</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
