<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | Spring-vibe'">Spring-vibe</title>
    <link rel="stylesheet" th:href="@{/css/brand.css}" />
    <link rel="stylesheet" th:href="@{/css/layout_app.css}" />
    <link rel="stylesheet" th:href="@{/css/login_modal.css}" />
    <link rel="stylesheet" th:if="${contentTemplate == 'html/intro'}" th:href="@{/css/intro.css}" />
    <link rel="stylesheet" th:href="@{/css/chat.css}" />
    <script th:src="@{/js/chat.js}" defer></script>
    <script th:src="@{/js/login_modal.js}" defer></script>
</head>
  <body>
    <div class="layout">
      <header class="sv-header" role="banner">
        <div class="sv-header__inner">
          <a class="sv-brand" th:href="@{/}">
            <span class="sv-mark" aria-hidden="true"></span>
            <span class="sv-brand__t">Spring-vibe</span>
          </a>

          <nav class="sv-nav" aria-label="Menu">
            <ul class="sv-nav__list" role="list">
              <li
                class="sv-nav__item"
                th:each="m : ${leftMenus}"
                th:classappend="${(!#lists.isEmpty(m.children)) ? ' sv-nav__item--has-mega' : ''}"
                th:if="${!#lists.isEmpty(leftMenus)}"
              >
                <a
                  class="sv-nav__link"
                  th:href="${(m.path != null) ? m.path : '#'}"
                  th:attr="onclick=${(m.path == null) ? 'return false;' : null}, aria-haspopup=${(!#lists.isEmpty(m.children)) ? 'true' : null}"
                  th:classappend="${(m.path != null and currentPath != null and (currentPath.startsWith(m.path) or (#strings.endsWith(m.path, '/list') and currentPath.startsWith(m.path.substring(0, m.path.length() - 5))))) ? ' is-active' : ''}"
                >
                  <span th:text="${(m.menuName != null and !m.menuName.isBlank()) ? m.menuName : m.menuKey}">Menu</span>
                </a>

                <div
                  class="sv-mega"
                  th:if="${!#lists.isEmpty(m.children)}"
                  role="region"
                  th:attr="aria-label=${((m.menuName != null and !m.menuName.isBlank()) ? m.menuName : m.menuKey) + ' submenu'}"
                >
                  <div class="sv-mega__panel">
                    <div class="sv-dd" role="list">
                      <th:block th:each="c : ${m.children}">
                        <th:block th:if="${#lists.isEmpty(c.children)}">
                          <a
                            class="sv-dd__a"
                            th:href="${(c.path != null) ? c.path : '#'}"
                            th:attr="onclick=${(c.path == null) ? 'return false;' : null}"
                            th:classappend="${(c.path != null and currentPath != null and (currentPath.startsWith(c.path) or (#strings.endsWith(c.path, '/list') and currentPath.startsWith(c.path.substring(0, c.path.length() - 5))))) ? ' is-active' : ''}"
                            role="listitem"
                          >
                            <span th:text="${(c.menuName != null and !c.menuName.isBlank()) ? c.menuName : c.menuKey}">Sub menu</span>
                          </a>
                        </th:block>

                        <th:block th:if="${!#lists.isEmpty(c.children)}">
                          <div class="sv-dd__group" role="listitem">
                            <div class="sv-dd__head" th:text="${(c.menuName != null and !c.menuName.isBlank()) ? c.menuName : c.menuKey}">Group</div>
                            <a
                              class="sv-dd__a sv-dd__a--sub"
                              th:each="g : ${c.children}"
                              th:href="${(g.path != null) ? g.path : '#'}"
                              th:attr="onclick=${(g.path == null) ? 'return false;' : null}"
                              th:classappend="${(g.path != null and currentPath != null and (currentPath.startsWith(g.path) or (#strings.endsWith(g.path, '/list') and currentPath.startsWith(g.path.substring(0, g.path.length() - 5))))) ? ' is-active' : ''}"
                            >
                              <span th:text="${(g.menuName != null and !g.menuName.isBlank()) ? g.menuName : g.menuKey}">Sub menu</span>
                            </a>
                          </div>
                        </th:block>
                      </th:block>
                    </div>
                  </div>
                </div>
              </li>

              <!-- Public fallback (guest): keep a minimal nav so the header doesn't look broken. -->
              <li class="sv-nav__item" th:if="${#lists.isEmpty(leftMenus)}">
                <a
                  class="sv-nav__link"
                  th:href="@{/intro}"
                  th:classappend="${((activeMenu == '/intro') or (currentPath == '/intro')) ? ' is-active' : ''}"
                >
                  소개
                </a>
              </li>
            </ul>
          </nav>

              <div class="sv-nav-empty" th:if="${isAuthenticated and #lists.isEmpty(leftMenus)}">No menus assigned</div>

          <div class="sv-auth">
            <button
              id="openLogin"
              class="sv-btn sv-btn--ghost"
              type="button"
              th:if="${!isAuthenticated}"
              aria-haspopup="dialog"
              aria-controls="loginModal"
            >
              Log in
            </button>

            <th:block th:if="${isAuthenticated}">
              <button id="chatOpen" class="sv-btn sv-btn--pill" type="button" aria-haspopup="dialog" aria-controls="chatModal">AI Chat</button>

              <form th:action="@{/logout}" method="post">
                <button class="sv-btn sv-btn--ghost" type="submit">Logout</button>
              </form>
            </th:block>
          </div>
        </div>
      </header>

      <main class="main" aria-label="Content">
        <header class="topbar" th:if="${contentTemplate != 'html/intro'}">
          <div>
            <h2 th:text="${pageTitle}">Dashboard</h2>
          </div>
        </header>

        <section class="content">
          <th:block th:replace="${contentTemplate} :: content"></th:block>
        </section>
      </main>
    </div>

    <!-- Login modal -->
    <div th:if="${!isAuthenticated}" id="loginModal" class="modal sv-login-modal" hidden>
      <div id="loginBackdrop" class="backdrop" aria-hidden="true"></div>
      <div class="dialog" role="dialog" aria-modal="true" aria-label="로그인">
        <div class="dialog-head">
          <div class="dialog-title">Log In</div>
          <button id="closeLogin" class="x" type="button" aria-label="닫기">Close</button>
        </div>
        <div class="dialog-body">
          <div class="msg error" role="alert" aria-live="polite" th:if="${param.error}">
            로그인에 실패했습니다. 아이디/비밀번호를 확인하세요.
          </div>
          <div class="msg ok" role="status" aria-live="polite" th:if="${param.logout}">
            로그아웃되었습니다.
          </div>

          <form id="loginForm" th:action="@{/login}" method="post" novalidate>
            <label>
              <div class="label-row">
                <strong>아이디</strong>
              </div>
              <div class="field">
                <input
                  id="username"
                  name="username"
                  type="text"
                  autocomplete="username"
                  placeholder="아이디를 입력하세요"
                  required
                />
              </div>
            </label>

            <label>
              <div class="label-row">
                <strong>비밀번호</strong>
              </div>
              <div class="field">
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="비밀번호를 입력하세요"
                  required
                />
                <button class="toggle" type="button" id="togglePw" aria-controls="password" aria-pressed="false">
                  보기
                </button>
              </div>
            </label>

            <button class="submit" type="submit">로그인</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Chat modal (Ollama) -->
    <div id="chatModal" class="chat-modal" hidden>
      <div id="chatBackdrop" class="chat-backdrop" aria-hidden="true"></div>
      <div class="chat-dialog chat-phone" role="dialog" aria-modal="true" aria-label="Chatbot dialog">
        <div class="chat-dialog-head">
          <div>
            <div class="chat-dialog-title">AI Chat</div>
            <div id="chatHealth" class="chat-health muted">Checking Ollama...</div>
          </div>
          <div class="chat-dialog-actions">
            <button id="chatClear" class="btn btn-inline" type="button">Clear</button>
            <button id="chatClose" class="btn btn-inline" type="button">Close</button>
          </div>
        </div>

        <div id="chatLog" class="chat-log" aria-live="polite"></div>

        <form id="chatForm" class="chat-form">
          <div class="field chat-input">
            <div class="label">Message</div>
            <div class="chat-compose-row">
              <textarea id="chatMessage" class="input" rows="3" placeholder="메시지를 입력하세요 (Ctrl+Enter 보내기)" autocomplete="off"></textarea>
              <button id="chatSend" class="btn btn-inline btn-primary" type="submit">보내기</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
