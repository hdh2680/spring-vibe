<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | Basic IAM'">Basic IAM</title>
    <link rel="stylesheet" th:href="@{/css/layout_app.css}" />
</head>
  <body>
    <div class="layout">
      <aside class="sidebar" aria-label="Sidebar">
        <div class="side-top">
          <div class="brand">
            <div class="mark" aria-hidden="true"></div>
            <div>
              <h1>Basic IAM</h1>
              <p>Admin console (sample UI)</p>
            </div>
          </div>
          <div class="user">
            <div class="name" th:text="${#authentication?.name}">user</div>
            <div class="meta">Signed in</div>
          </div>
        </div>

        <nav class="nav" aria-label="Menu">
          <div class="nav-empty" th:if="${#lists.isEmpty(leftMenus)}">
            No menus assigned
          </div>

          <th:block th:each="m : ${leftMenus}">
            <a
              th:if="${m.path != null}"
              th:href="${m.path}"
              th:classappend="${currentPath != null and currentPath.startsWith(m.path)} ? ' active' : ''"
            >
              <span class="dot" aria-hidden="true"></span>
              <span th:text="${m.menuName}">Menu</span>
            </a>
            <a
              th:if="${m.path == null}"
              href="#"
              onclick="return false;"
            >
              <span class="dot" aria-hidden="true"></span>
              <span th:text="${m.menuName}">Menu</span>
            </a>

            <th:block th:each="c : ${m.children}">
              <a
                class="sub"
                th:if="${c.path != null}"
                th:href="${c.path}"
                th:classappend="${currentPath != null and currentPath.startsWith(c.path)} ? ' active' : ''"
              >
                <span class="dot" aria-hidden="true"></span>
                <span th:text="${c.menuName}">Sub menu</span>
              </a>
              <a
                class="sub"
                th:if="${c.path == null}"
                href="#"
                onclick="return false;"
              >
                <span class="dot" aria-hidden="true"></span>
                <span th:text="${c.menuName}">Sub menu</span>
              </a>
            </th:block>
          </th:block>
        </nav>

        <div class="side-bottom">
          <form th:action="@{/logout}" method="post">
            <button class="btn" type="submit">Logout</button>
          </form>
        </div>
      </aside>

      <main class="main" aria-label="Content">
        <header class="topbar">
          <div>
            <h2 th:text="${pageTitle}">Dashboard</h2>
            <p>Layout is shared, content changes by route.</p>
          </div>
          <div class="muted">
            Auth: <strong th:text="${#authentication?.name}">user</strong>
          </div>
        </header>

        <section class="content" th:replace="${contentTemplate} :: content">
          Content
        </section>
      </main>
    </div>
  </body>
</html>
