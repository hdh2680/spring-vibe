<section xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="toolbar">
    <div>
      <h3>사용자 목록</h3>
      <p class="muted">users / roles / user_roles 기반</p>
    </div>
    <div>
      <a class="btn-link" th:href="@{/admin/users/regist}">+ 사용자 등록</a>
    </div>
  </div>

  <div class="panel table-wrap">
    <table class="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Name</th>
          <th>Email</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(users)}">
          <td colspan="6" class="muted">데이터가 없습니다.</td>
        </tr>
        <tr th:each="u : ${users}">
          <td th:text="${u.id}">1</td>
          <td th:text="${u.username}">username</td>
          <td th:text="${u.name}">name</td>
          <td th:text="${u.email}">email</td>
          <td th:text="${u.status}">ACTIVE</td>
          <td>
            <a class="action" th:href="@{/admin/users/view(id=${u.id})}">view</a>
            <span style="opacity:.5">|</span>
            <a class="action" th:href="@{/admin/users/regist(id=${u.id})}">edit</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
