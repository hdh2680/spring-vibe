<section xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <link rel="stylesheet" th:href="@{/css/amazon_product.css}" />

  <div class="toolbar">
    <div>
      <h3>Amazon Products</h3>
    </div>
    <div>
      <button
        th:if="${isAdmin}"
        id="apCacheOpen"
        class="btn btn-inline"
        type="button"
        title="LLM 번역/키워드 캐시 관리"
      >캐싱관리</button>
      <form th:if="${esEnabled}" th:action="@{/users/amazonProduct/reindex}" method="post" style="display:inline;">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-inline" type="submit">ES 재색인</button>
      </form>
      <form th:if="${esEnabled}" th:action="@{/users/amazonProduct/clear-es}" method="post" style="display:inline;">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-inline" type="submit" onclick="return confirm('ES 인덱스를 초기화할까요?');">ES 초기화</button>
      </form>
    </div>
  </div>

  <div th:if="${successMessage != null}" class="alert alert-success" style="margin-top:12px;">
    <div th:text="${successMessage}">success</div>
  </div>

  <div th:if="${errorMessage != null}" class="alert alert-danger" style="margin-top:12px;">
    <div><strong th:text="${errorCode}">ERR</strong></div>
    <div th:text="${errorMessage}">message</div>
  </div>

  <div class="amazon-main" style="margin-top: 12px;">
      <div class="panel panel-inner amazon-search">
        <form th:action="@{/users/amazonProduct/list}" method="get" class="amazon-searchbar">
          <label class="field amazon-searchbar-q">
            <div class="label">검색</div>
            <input class="input" type="text" name="q" th:value="${q}" placeholder="상품명 (영문/한글 가능)" autocomplete="off" />
          </label>

          <label class="field amazon-searchbar-cat">
            <div class="label">카테고리</div>
            <select class="select" name="categoryId">
              <option value="" th:selected="${selectedCategoryId == null}">전체</option>
              <option th:each="c : ${categories}"
                      th:value="${c.id}"
                      th:selected="${selectedCategoryId != null and selectedCategoryId == c.id}"
                      th:text="${c.name}"
              >카테고리</option>
            </select>
          </label>

          <label class="field amazon-searchbar-sort">
            <div class="label">정렬</div>
            <select class="select" name="sort">
              <option value="STARS_DESC" th:selected="${sortKey == 'STARS_DESC'}">별점 높은순</option>
              <option value="REVIEWS_DESC" th:selected="${sortKey == 'REVIEWS_DESC'}">리뷰 많은순</option>
              <option value="PRICE_ASC" th:selected="${sortKey == 'PRICE_ASC'}">가격 낮은순</option>
              <option value="PRICE_DESC" th:selected="${sortKey == 'PRICE_DESC'}">가격 높은순</option>
              <option value="TITLE_ASC" th:selected="${sortKey == 'TITLE_ASC'}">이름 (A-Z)</option>
            </select>
          </label>

          <input type="hidden" name="page" value="0" />
          <input type="hidden" name="size" th:value="${size}" />

          <div class="amazon-searchbar-actions">
            <button class="btn-action btn-action--search" type="submit">검색</button>
            <a class="btn-action btn-action--reset" th:href="@{/users/amazonProduct/list}">초기화</a>
          </div>

          <div class="amazon-searchbar-hint muted" th:if="${showQueryUsedHint}">
            번역/동의어: <span th:text="${queryUsed}">queryUsed</span>
          </div>
        </form>

      </div>

      <div class="pager" th:if="${totalPages != null and totalPages > 0}">
        <div class="muted">
          페이지: <b th:text="${page + 1}">1</b> / <b th:text="${totalPages}">1</b>
          <span style="opacity:.5">|</span>
          개수: <b th:text="${size}">20</b>
        </div>
        <div class="pager-actions">
          <a class="btn-link"
             th:classappend="${!hasPrev} ? ' is-disabled' : ''"
             th:href="${hasPrev} ? @{/users/amazonProduct/list(q=${q}, categoryId=${selectedCategoryId}, sort=${sortKey}, page=${prevPage}, size=${size})} : '#'"
             th:attr="aria-disabled=${!hasPrev}"
          >이전</a>
          <a class="btn-link"
             th:classappend="${!hasNext} ? ' is-disabled' : ''"
             th:href="${hasNext} ? @{/users/amazonProduct/list(q=${q}, categoryId=${selectedCategoryId}, sort=${sortKey}, page=${nextPage}, size=${size})} : '#'"
             th:attr="aria-disabled=${!hasNext}"
          >다음</a>
        </div>
      </div>

      <div class="amazon-grid" th:if="${items != null}">
        <div class="amazon-empty muted" th:if="${#lists.isEmpty(items)}">검색 결과가 없습니다.</div>

        <article class="amazon-card panel" th:each="it : ${items}">
          <a class="amazon-img"
             th:href="${it.productUrl}"
             target="_blank"
             rel="noreferrer noopener"
             th:if="${it.imgUrl != null and !#strings.isEmpty(#strings.trim(it.imgUrl))}">
            <img th:src="${it.imgUrl}" alt="" loading="lazy" referrerpolicy="no-referrer" />
          </a>
          <div class="amazon-img amazon-img placeholder" th:if="${it.imgUrl == null or #strings.isEmpty(#strings.trim(it.imgUrl))}">
            no image
          </div>

          <div class="amazon-body">
            <a class="amazon-title"
               th:href="${it.productUrl}"
               target="_blank"
               rel="noreferrer noopener">
              <span class="amazon-badge"
                    th:if="${it.isBestSeller != null and it.isBestSeller}"
              >베스트셀러</span>
              <span th:text="${it.productNameKo != null and !#strings.isEmpty(#strings.trim(it.productNameKo)) ? it.productNameKo : it.title}">title</span>
            </a>
            <div class="amazon-meta muted">
              <div class="amazon-rating-line">
                <span class="amazon-stars" aria-label="별점">
                  <span class="amazon-stars-bg">★★★★★</span>
                  <span class="amazon-stars-fg"
                        th:style="'width:' + (${it.stars} == null ? 0 : (${it.stars} &gt; 5 ? 100 : (${it.stars} &lt; 0 ? 0 : ${it.stars} * 20))) + '%'"
                  >★★★★★</span>
                </span>
                <span class="amazon-rating-num" th:text="${it.stars != null ? it.stars : 0}">0</span>
              </div>
              <div class="amazon-reviews-line">
                리뷰: <span th:text="${it.reviews != null ? it.reviews : 0}">0</span>
              </div>
            </div>
            <div class="amazon-price">
              <span class="amazon-price-main" th:text="${it.price != null ? '$' + it.price : ''}">$0</span>
              <span class="amazon-price-list muted" th:if="${it.listPrice != null and it.listPrice > 0}" th:text="${'$' + it.listPrice}">$0</span>
            </div>
          </div>
        </article>
      </div>
  </div>
<!-- Cache admin modal (ROLE_ADMIN only) -->
<div th:if="${isAdmin}" id="apCacheBackdrop" class="ap-cache-backdrop" hidden>
  <div class="ap-cache-modal" role="dialog" aria-modal="true" aria-label="Amazon Product 캐시 관리">
    <div class="ap-cache-head">
      <div>
        <div class="ap-cache-title">캐시 관리</div>
        <div class="muted" style="font-size: 12px; margin-top: 2px;">Amazon Product LLM 키워드 캐시</div>
      </div>
      <div class="ap-cache-actions">
        <button id="apCacheClearAll" class="btn btn-inline" type="button">전체 비우기</button>
        <button id="apCacheClose" class="btn btn-inline" type="button">닫기</button>
      </div>
    </div>

    <div class="ap-cache-body">
      <div class="ap-cache-toolbar">
        <label class="field" style="margin: 0; min-width: 240px;">
          <div class="label">필터(contains)</div>
          <input id="apCacheContains" class="input" type="text" placeholder="예: 야구모자 / v1:" autocomplete="off" />
        </label>
        <label class="field" style="margin: 0;">
          <div class="label">페이지 크기</div>
          <select id="apCacheSize" class="select">
            <option value="10">10</option>
            <option value="25" selected>25</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </label>
        <div class="amazon-searchbar-actions" style="padding: 0; justify-content: flex-start;">
          <button id="apCacheRefresh" class="btn-action btn-action--search" type="button">새로고침</button>
          <button id="apCacheReset" class="btn-action btn-action--reset" type="button">초기화</button>
        </div>
        <div id="apCacheMeta" class="muted" style="font-size: 12px; margin-left: auto;">-</div>
      </div>

      <div class="ap-cache-tablewrap" aria-label="cache table">
        <table class="ap-cache-table">
          <thead>
            <tr>
              <th style="width: 220px;">검색어</th>
              <th style="width: 70px;">TTL</th>
              <th>값(미리보기)</th>
              <th style="width: 90px;">액션</th>
            </tr>
          </thead>
          <tbody id="apCacheBody">
            <tr><td colspan="4" class="muted">로딩 전</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="ap-cache-foot">
      <div class="muted" style="font-size: 12px;">
        캐시는 성능 최적화용입니다. 필요 시 개별 삭제/전체 비우기를 사용할 수 있습니다.
      </div>
      <div class="ap-cache-pager">
        <button id="apCachePrev" class="btn-action btn-action--reset" type="button">이전</button>
        <div class="muted"><span id="apCachePage">1</span> / <span id="apCacheTotalPages">1</span></div>
        <button id="apCacheNext" class="btn-action btn-action--reset" type="button">다음</button>
      </div>
    </div>
  </div>
</div>

<script th:if="${isAdmin}">
  (() => {
    const openBtn = document.getElementById('apCacheOpen');
    const backdrop = document.getElementById('apCacheBackdrop');
    const closeBtn = document.getElementById('apCacheClose');
    const clearAllBtn = document.getElementById('apCacheClearAll');
    const refreshBtn = document.getElementById('apCacheRefresh');
    const resetBtn = document.getElementById('apCacheReset');
    const containsEl = document.getElementById('apCacheContains');
    const sizeEl = document.getElementById('apCacheSize');
    const metaEl = document.getElementById('apCacheMeta');
    const bodyEl = document.getElementById('apCacheBody');
    const prevBtn = document.getElementById('apCachePrev');
    const nextBtn = document.getElementById('apCacheNext');
    const pageEl = document.getElementById('apCachePage');
    const totalPagesEl = document.getElementById('apCacheTotalPages');

    const listUrl = '/users/amazonProduct/cache/llm-keywords';
    const evictUrl = '/users/amazonProduct/cache/llm-keywords/evict';
    const clearUrl = '/users/amazonProduct/cache/llm-keywords/clear';

    if (!openBtn || !backdrop || !closeBtn || !refreshBtn || !bodyEl || !window.fetch) return;

    let state = { page: 0, size: 25, contains: '' };

    function setOpen(open) {
      backdrop.hidden = !open;
      document.body.style.overflow = open ? 'hidden' : '';
      if (open) load(0);
    }

    openBtn.addEventListener('click', () => setOpen(true));
    closeBtn.addEventListener('click', () => setOpen(false));
    backdrop.addEventListener('click', (e) => { if (e.target === backdrop) setOpen(false); });
    document.addEventListener('keydown', (e) => { if (!backdrop.hidden && e && e.key === 'Escape') setOpen(false); });

    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    async function postForm(url, params) {
      const body = new URLSearchParams(params || {});
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' }, body });
      const json = await res.json().catch(() => null);
      return { res, json };
    }

    async function load(page) {
      state.size = Number(sizeEl && sizeEl.value ? sizeEl.value : state.size);
      state.contains = String(containsEl && containsEl.value ? containsEl.value : '').trim();
      state.page = Math.max(0, Number(page ?? state.page) || 0);

      bodyEl.innerHTML = '<tr><td colspan="4" class="muted">로딩...</td></tr>';
      if (metaEl) metaEl.textContent = 'loading...';

      const sp = new URLSearchParams();
      sp.set('page', String(state.page));
      sp.set('size', String(state.size));
      if (state.contains) sp.set('contains', state.contains);

      const res = await fetch(`${listUrl}?${sp.toString()}`, { headers: { 'Accept': 'application/json' } });
      const json = await res.json().catch(() => null);
      if (!res.ok || !json) {
        bodyEl.innerHTML = `<tr><td colspan="4" class="muted">조회 실패 (${res.status})</td></tr>`;
        if (metaEl) metaEl.textContent = 'error';
        return;
      }

      const total = Number(json.total ?? 0);
      const size = Number(json.size ?? state.size);
      const pageNum = Number(json.page ?? state.page);
      const totalPages = total <= 0 ? 1 : Math.max(1, Math.ceil(total / Math.max(1, size)));

      state.page = pageNum;
      if (pageEl) pageEl.textContent = String(pageNum + 1);
      if (totalPagesEl) totalPagesEl.textContent = String(totalPages);
      if (metaEl) metaEl.textContent = `total: ${total}`;

      if (prevBtn) prevBtn.disabled = pageNum <= 0;
      if (nextBtn) nextBtn.disabled = pageNum + 1 >= totalPages;

      const items = Array.isArray(json.items) ? json.items : [];
      if (items.length === 0) {
        bodyEl.innerHTML = '<tr><td colspan="4" class="muted">캐시가 없습니다.</td></tr>';
        return;
      }

      bodyEl.innerHTML = items.map(it => {
        const cacheKey = String(it.cacheKey ?? '');
        const query = String(it.query ?? '');
        const ttl = String(it.ttlHuman ?? (it.ttlSeconds != null ? it.ttlSeconds + 's' : ''));
        const v = String(it.valuePreview ?? it.value ?? '');
        return `
          <tr>
            <td>
              <div style="font-weight:800;">${esc(query || '(unknown)')}</div>
              <div class="ap-cache-k">${esc(cacheKey)}</div>
            </td>
            <td class="ap-cache-k">${esc(ttl)}</td>
            <td class="ap-cache-v">${esc(v)}</td>
            <td>
              <button class="btn btn-inline" type="button" data-evict="${esc(cacheKey)}">삭제</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    refreshBtn.addEventListener('click', () => load(state.page));
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        if (containsEl) containsEl.value = '';
        if (sizeEl) sizeEl.value = '25';
        state = { page: 0, size: 25, contains: '' };
        load(0);
      });
    }
    if (prevBtn) prevBtn.addEventListener('click', () => load(state.page - 1));
    if (nextBtn) nextBtn.addEventListener('click', () => load(state.page + 1));

    bodyEl.addEventListener('click', async (e) => {
      const btn = e && e.target ? e.target.closest('button[data-evict]') : null;
      if (!btn) return;
      const key = btn.getAttribute('data-evict');
      if (!key) return;
      const ok = confirm(`캐시를 삭제할까요?\n\n${key}`);
      if (!ok) return;
      btn.disabled = true;
      try {
        const { res } = await postForm(evictUrl, { cacheKey: key });
        if (!res.ok) alert(`삭제 실패 (${res.status})`);
        await load(state.page);
      } catch (err) {
        alert(err && err.message ? err.message : '삭제 중 오류가 발생했습니다.');
      } finally {
        btn.disabled = false;
      }
    });

    if (clearAllBtn) {
      clearAllBtn.addEventListener('click', async () => {
        const ok = confirm('캐시 전체를 비울까요?');
        if (!ok) return;
        clearAllBtn.disabled = true;
        try {
          const { res } = await postForm(clearUrl, {});
          if (!res.ok) alert(`전체 비우기 실패 (${res.status})`);
          await load(0);
        } catch (err) {
          alert(err && err.message ? err.message : '요청 중 오류가 발생했습니다.');
        } finally {
          clearAllBtn.disabled = false;
        }
      });
    }
  })();
</script>
</section>
