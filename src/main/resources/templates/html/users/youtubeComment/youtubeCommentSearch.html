<section xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <style>
    /* Only for this page: keep the comment result area scrollable (overflow) */
    .ytc-table-wrap {
      max-height: 70vh;
      overflow: auto;
      overscroll-behavior: contain;
    }

    /* Cleaner URL form layout */
    .ytc-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px auto;
      gap: 12px;
      align-items: end;
    }
    @media (max-width: 980px) {
      .ytc-form { grid-template-columns: 1fr; }
    }

    .ytc-field { min-width: 0; }
    .ytc-label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      font-weight: 750;
      color: var(--muted);
      letter-spacing: -0.1px;
    }
    .ytc-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.90);
      color: var(--text);
      transition: box-shadow 120ms ease, border-color 120ms ease, background 120ms ease;
    }
    .ytc-input::placeholder { color: rgba(17, 24, 39, 0.45); }
    .ytc-input:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      background: rgba(255, 255, 255, 0.98);
    }
    .ytc-help {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .ytc-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      padding-top: 22px; /* align with inputs + labels */
    }
    @media (max-width: 980px) {
      .ytc-actions { padding-top: 0; justify-content: flex-start; }
    }
    /* Override global .btn width:100% for inline form actions on this page */
    .ytc-actions .btn {
      width: auto;
      padding: 10px 14px;
      border-radius: 14px;
    }
    .ytc-actions .btn-primary {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.95), rgba(22, 163, 74, 0.88));
      border-color: rgba(37, 99, 235, 0.28);
      color: rgba(255, 255, 255, 0.96);
    }
    .ytc-actions .btn-primary:hover {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.98), rgba(22, 163, 74, 0.92));
      border-color: rgba(37, 99, 235, 0.34);
    }
    .ytc-actions .btn-secondary { background: rgba(255, 255, 255, 0.78); }
    .ytc-actions .btn-secondary:disabled,
    .ytc-actions .btn-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    /* Sticky header while scrolling */
    .ytc-table-wrap table.table thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: rgba(17, 24, 39, 0.04);
    }

    /* Prevent long comments from forcing horizontal overflow */
    .ytc-table-wrap td:last-child {
      word-break: break-word;
    }
  </style>
  <div class="toolbar">
    <div>
      <h3>유튜브 댓글분석</h3>
    </div>
    <div>
      <a class="btn-link" th:href="@{/users/youtubeComment/analysis}">이력/분석</a>
    </div>
  </div>

  <div class="panel" style="margin-bottom: 1rem">
    <div class="panel-inner">
      <form id="ytcForm" class="ytc-form" th:action="@{/users/youtubeComment/search}" method="post" th:object="${form}">
      <div class="ytc-field">
        <label class="ytc-label" for="url">유튜브 URL</label>
        <input
          id="url"
          type="text"
          th:field="*{url}"
          placeholder="예) https://www.youtube.com/watch?v=VIDEO_ID"
          class="ytc-input"
        />
        <div class="ytc-help" th:if="${#fields.hasErrors('url')}" th:errors="*{url}"></div>
      </div>

      <div class="ytc-field">
        <label class="ytc-label" for="limit">가져올 개수</label>
        <input
          id="limit"
          type="number"
          min="1"
          max="500"
          step="1"
          th:field="*{limit}"
          class="ytc-input"
        />
        <div class="ytc-help" th:if="${#fields.hasErrors('limit')}" th:errors="*{limit}"></div>
      </div>

      <input type="hidden" th:field="*{pageToken}" />

      <div class="ytc-actions">
        <button class="btn btn-primary" type="submit">데이터 가져오기</button>
        <button id="btnExportAsync" class="btn btn-secondary" type="submit" th:formaction="@{/users/youtubeComment/search/export}">저장(JSONL)</button>
      </div>
    </form>

    <div th:if="${errorMessage != null}" style="margin-top:.75rem; padding:.65rem .8rem; border:1px solid rgba(200,0,0,.25); border-radius:.6rem; background: rgba(200,0,0,.05)">
      <div style="font-weight:600">오류</div>
      <div class="muted" th:text="${errorCode} + ' - ' + ${errorMessage}">ERR - message</div>
    </div>
    <script th:if="${successMessage != null}" th:inline="javascript">
      alert([[${successMessage}]]);
    </script>
    </div>
  </div>

  <script th:inline="javascript">
    (() => {
      const form = document.getElementById('ytcForm');
      const exportBtn = document.getElementById('btnExportAsync');
      const exportUrl = /*[[@{/users/youtubeComment/search/exportAsync}]]*/ '/users/youtubeComment/search/exportAsync';
      if (!form || !exportBtn || !window.fetch) return;

      form.addEventListener('submit', async (e) => {
        if (e.submitter !== exportBtn) return; // keep normal submit for search
        e.preventDefault();

        exportBtn.disabled = true;
        const prevText = exportBtn.textContent;
        exportBtn.textContent = '저장중...';

        try {
          const body = new URLSearchParams(new FormData(form));
          const res = await fetch(exportUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8' },
            body
          });
          const json = await res.json().catch(() => null);
          if (!res.ok) {
            const msg = json && json.message ? json.message : `요청 실패 (${res.status})`;
            const code = json && json.errorCode ? json.errorCode : 'ERR';
            alert(`${code} - ${msg}`);
            return;
          }

          const msg = json && json.message ? json.message : '저장되었습니다.';
          const filePath = json && json.filePath ? json.filePath : null;
          alert(filePath ? `${msg}\n\n${filePath}` : msg);
        } catch (err) {
          alert(err && err.message ? err.message : '저장 중 오류가 발생했습니다.');
        } finally {
          exportBtn.disabled = false;
          exportBtn.textContent = prevText;
        }
      });
    })();
  </script>

  <div th:if="${page == null}">
    <div class="panel table-wrap ytc-table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th style="width: 180px">Author</th>
            <th style="width: 170px">Published</th>
            <th style="width: 80px">Likes</th>
            <th>Comment</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="4" class="muted">아직 댓글 목록이 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div th:if="${page != null}">
    <div class="toolbar" style="margin-bottom:.5rem">
      <div>
        <div class="muted">
          videoId:
          <strong th:text="${page.videoId}">videoId</strong>
          <span th:if="${page.collectedCount != null}">
            | collected:
            <strong th:text="${page.collectedCount}">0</strong>
          </span>
          <span th:if="${page.requestedLimit != null}">
            /
            <strong th:text="${page.requestedLimit}">0</strong>
          </span>
          <span th:if="${page.totalResults != null}">
            | total:
            <strong th:text="${page.totalResults}">0</strong>
          </span>
        </div>
      </div>
      <div th:if="${page.nextPageToken != null}">
        <form th:action="@{/users/youtubeComment/search}" method="post" th:object="${form}">
          <input type="hidden" th:field="*{url}" />
          <input type="hidden" th:field="*{limit}" />
          <input type="hidden" name="pageToken" th:value="${page.nextPageToken}" />
          <button class="btn-link" type="submit">다음 페이지</button>
        </form>
      </div>
    </div>

    <div class="panel table-wrap ytc-table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th style="width: 180px">Author</th>
            <th style="width: 170px">Published</th>
            <th style="width: 80px">Likes</th>
            <th>Comment</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(page.comments)}">
            <td colspan="4" class="muted">댓글이 없습니다.</td>
          </tr>
          <tr th:each="c : ${page.comments}">
            <td th:text="${c.authorDisplayName}">author</td>
            <td th:text="${c.publishedAtView}">date</td>
            <td th:text="${c.likeCount}">0</td>
            <td style="white-space: pre-wrap" th:text="${c.text}">text</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
