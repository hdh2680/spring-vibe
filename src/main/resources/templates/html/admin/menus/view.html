<section xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="toolbar">
    <div>
      <h3>메뉴 상세</h3>
    </div>
    <div style="display:flex; gap:8px">
      <a class="btn-link" th:href="@{/admin/menus/list}">목록</a>
      <a class="btn-link" th:href="@{/admin/menus/regist(id=${menu.id})}">수정</a>
      <form th:action="@{/admin/menus/delete}" method="post" style="margin:0">
        <input type="hidden" name="id" th:value="${menu.id}" />
        <button class="btn-danger" type="submit" onclick="return confirm('삭제할까요?');">삭제</button>
      </form>
    </div>
  </div>

  <div class="grid-1">
    <div class="panel">
      <div class="panel-inner">
        <h4>기본 정보</h4>
        <dl class="kv">
          <dt>ID</dt><dd th:text="${menu.id}">1</dd>
          <dt>Key</dt><dd th:text="${menu.menuKey}">KEY</dd>
          <dt>Name</dt><dd th:text="${menu.menuName}">NAME</dd>
          <dt>Path</dt><dd th:text="${menu.path}">/path</dd>
          <dt>Parent</dt><dd th:text="${menu.parentName}">parent</dd>
          <dt>Sort</dt><dd th:text="${menu.sortOrder}">0</dd>
          <dt>Enabled</dt><dd th:text="${menu.isEnabled}">true</dd>
        </dl>
      </div>
    </div>
  </div>
</section>
