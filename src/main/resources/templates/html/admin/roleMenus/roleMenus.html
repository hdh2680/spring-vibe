<section xmlns:th="http://www.thymeleaf.org" th:fragment="content">
  <div class="toolbar">
    <div>
      <h3>권한 메뉴 관리</h3>
    </div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="panel-inner">
        <h4>권한 목록</h4>
        <div style="display:grid; gap:8px; font-size:12px">
          <a
            th:each="r : ${roles}"
            class="btn-link"
            th:href="@{/admin/roleMenus/manage(roleId=${r.id})}"
            th:style="${selectedRole != null and selectedRole.id == r.id} ? 'border-color: rgba(22,163,74,0.35); background: rgba(22,163,74,0.06);' : ''"
          >
            <span th:text="${r.roleName}">ROLE_USER</span>
            <span class="muted" th:if="${r.description != null}" th:text="' (' + ${r.description} + ') '">(desc)</span>
          </a>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-inner">
        <h4>
          선택 권한:
          <span th:text="${selectedRole.roleName}">ROLE_USER</span>
        </h4>

        <form th:action="@{/admin/roleMenus/manage}" method="post" th:object="${form}">
          <input type="hidden" th:field="*{roleId}" />

          <div th:if="${#lists.isEmpty(menuTree)}" class="muted">메뉴 데이터가 없습니다.</div>

          <div th:unless="${#lists.isEmpty(menuTree)}" style="display:grid; gap:10px; font-size:12px">
            <div th:each="m : ${menuTree}" style="border: 1px solid rgba(17,24,39,0.10); border-radius: 14px; padding: 10px 10px; background: rgba(17,24,39,0.02)">
              <label style="display:flex; align-items:center; gap:10px">
                <input type="checkbox" th:value="${m.id}" th:field="*{menuIds}" />
                <div style="font-weight:800" th:text="${m.menuName}">Menu</div>
                <div class="muted" th:text="${m.path}">/path</div>
              </label>

              <div th:if="${not #lists.isEmpty(m.children)}" style="margin-top: 8px; display:grid; gap:8px">
                <label th:each="c : ${m.children}" style="display:flex; align-items:center; gap:10px; padding-left: 18px">
                  <input type="checkbox" th:value="${c.id}" th:field="*{menuIds}" />
                  <div style="font-weight:700" th:text="${c.menuName}">Child</div>
                  <div class="muted" th:text="${c.path}">/path</div>
                </label>
              </div>
            </div>
          </div>

          <div style="margin-top: 12px; display:flex; justify-content:flex-end">
            <button type="submit" class="btn-link">저장</button>
          </div>
        </form>

        <p class="muted" style="margin-top: 10px">
          NOTE: ROLE_ADMIN은 안전을 위해 이 화면에서 수정 불가(서버에서 차단)입니다.
        </p>
      </div>
    </div>
  </div>
</section>
