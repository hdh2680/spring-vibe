<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Main</title>
    <style>
      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        margin: 24px;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
      }
      .card {
        border: 1px solid rgba(0, 0, 0, 0.12);
        border-radius: 12px;
        padding: 18px;
      }
      .muted {
        color: rgba(0, 0, 0, 0.65);
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      button {
        border: 1px solid rgba(0, 0, 0, 0.16);
        background: white;
        padding: 8px 12px;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="row">
        <div>
          <h1>Main</h1>
          <p class="muted">
            Signed in as <strong th:text="${#authentication?.name}">user</strong>
          </p>
        </div>
        <form th:action="@{/logout}" method="post">
          <button type="submit">Logout</button>
        </form>
      </div>

      <section class="card">
        <h2>Welcome</h2>
        <p class="muted">This page requires authentication.</p>
      </section>
    </main>
  </body>
</html>
