<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.08);
        --card-border: rgba(255, 255, 255, 0.14);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.68);
        --input: rgba(255, 255, 255, 0.12);
        --input-border: rgba(255, 255, 255, 0.18);
        --primary: #7c3aed;
        --primary-2: #22c55e;
        --danger: #ef4444;
        --ring: rgba(124, 58, 237, 0.35);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Noto Sans KR",
          "Apple SD Gothic Neo",
          Arial,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(900px 450px at 12% 10%, rgba(124, 58, 237, 0.35), transparent 55%),
          radial-gradient(700px 450px at 88% 18%, rgba(34, 197, 94, 0.22), transparent 55%),
          radial-gradient(800px 520px at 55% 90%, rgba(59, 130, 246, 0.18), transparent 60%),
          linear-gradient(180deg, #070b14, var(--bg) 35%, #070b14);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .wrap {
        width: min(440px, 100%);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(124, 58, 237, 0.95), rgba(34, 197, 94, 0.85));
        box-shadow: 0 12px 28px rgba(124, 58, 237, 0.28);
      }

      .brand h1 {
        font-size: 18px;
        margin: 0;
        letter-spacing: -0.3px;
      }

      .brand p {
        margin: 4px 0 0;
        font-size: 13px;
        color: var(--muted);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--card-border);
        box-shadow: var(--shadow);
        border-radius: var(--radius);
        padding: 22px;
        backdrop-filter: blur(14px);
      }

      .title {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .title h2 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.3px;
      }

      .title span {
        font-size: 12px;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 8px;
      }

      .label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .label-row strong {
        font-size: 13px;
        font-weight: 650;
        color: rgba(255, 255, 255, 0.86);
      }

      .hint {
        font-size: 12px;
        color: var(--muted);
      }

      .field {
        position: relative;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        appearance: none;
        border: 1px solid var(--input-border);
        background: var(--input);
        color: var(--text);
        border-radius: 14px;
        padding: 12px 12px;
        outline: none;
        font-size: 14px;
        transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }

      input:focus {
        border-color: rgba(124, 58, 237, 0.7);
        box-shadow: 0 0 0 5px var(--ring);
        background: rgba(255, 255, 255, 0.14);
      }

      .toggle {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.86);
        border-radius: 12px;
        padding: 8px 10px;
        font-size: 12px;
        cursor: pointer;
        user-select: none;
      }

      .toggle:focus-visible {
        outline: none;
        box-shadow: 0 0 0 5px var(--ring);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 2px;
      }

      .check {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.82);
      }

      .check input {
        width: 16px;
        height: 16px;
        accent-color: var(--primary);
      }

      .link {
        color: rgba(255, 255, 255, 0.86);
        text-decoration: none;
        font-size: 13px;
      }

      .link:hover {
        text-decoration: underline;
      }

      .btn {
        margin-top: 6px;
        width: 100%;
        border: 0;
        background: linear-gradient(135deg, var(--primary), #4f46e5);
        color: white;
        padding: 12px 14px;
        border-radius: 14px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.2px;
        cursor: pointer;
        box-shadow: 0 14px 30px rgba(124, 58, 237, 0.28);
        transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
      }

      .btn:hover {
        filter: brightness(1.04);
        box-shadow: 0 18px 40px rgba(124, 58, 237, 0.34);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .divider {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 10px;
        align-items: center;
        margin: 12px 0 4px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 12px;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        background: rgba(255, 255, 255, 0.14);
      }

      .oauth {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .ghost {
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
        padding: 11px 12px;
        border-radius: 14px;
        font-size: 13px;
        cursor: pointer;
      }

      .foot {
        margin-top: 14px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
      }

      .foot a {
        color: rgba(255, 255, 255, 0.85);
      }

      .error {
        display: none;
        border: 1px solid rgba(239, 68, 68, 0.35);
        background: rgba(239, 68, 68, 0.1);
        color: rgba(255, 255, 255, 0.9);
        border-radius: 14px;
        padding: 10px 12px;
        font-size: 13px;
      }

      .error strong {
        color: white;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="brand" aria-label="서비스 정보">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Basic IAM</h1>
          <p>계정으로 로그인하세요</p>
        </div>
      </header>

      <section class="card" aria-label="로그인 폼">
        <div class="title">
          <h2>로그인</h2>
          <span>데모 UI (처리 없음)</span>
        </div>

        <div class="error" id="errorBox" role="alert" aria-live="polite">
          <strong>안내:</strong> 이 화면은 UI만 제공하며, 로그인 처리/검증은 연결되어 있지 않아요.
        </div>

        <form id="loginForm" action="#" method="post" novalidate>
          <label>
            <div class="label-row">
              <strong>아이디</strong>
              <span class="hint">예: honggildong</span>
            </div>
            <div class="field">
              <input
                id="username"
                name="username"
                type="text"
                inputmode="email"
                autocomplete="username"
                placeholder="아이디를 입력하세요"
                required
              />
            </div>
          </label>

          <label>
            <div class="label-row">
              <strong>비밀번호</strong>
              <a class="link" href="#" onclick="return false;">비밀번호 찾기</a>
            </div>
            <div class="field">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="비밀번호를 입력하세요"
                required
              />
              <button class="toggle" type="button" id="togglePw" aria-controls="password" aria-pressed="false">
                보기
              </button>
            </div>
          </label>

          <div class="row">
            <label class="check">
              <input type="checkbox" name="remember" />
              로그인 상태 유지
            </label>
            <a class="link" href="#" onclick="return false;">회원가입</a>
          </div>

          <button class="btn" type="submit">로그인</button>

          <div class="divider">또는</div>
          <div class="oauth" aria-label="간편 로그인(모양만)">
            <button class="ghost" type="button" onclick="return false;">Google로 계속</button>
            <button class="ghost" type="button" onclick="return false;">GitHub로 계속</button>
          </div>

          <p class="foot">
            계속 진행하면 <a href="#" onclick="return false;">이용약관</a> 및 <a href="#" onclick="return false;">개인정보 처리방침</a>에 동의하게 됩니다.
          </p>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("errorBox");
      const togglePw = document.getElementById("togglePw");
      const password = document.getElementById("password");

      togglePw.addEventListener("click", () => {
        const showing = password.type === "text";
        password.type = showing ? "password" : "text";
        togglePw.textContent = showing ? "보기" : "숨기기";
        togglePw.setAttribute("aria-pressed", String(!showing));
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        errorBox.style.display = "block";
      });
    </script>
  </body>
</html>
