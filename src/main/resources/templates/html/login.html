<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
  <body>
    <main class="wrap">
      <header class="brand" aria-label="서비스 정보">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>AI DEV Project</h1>
          <p>계정으로 로그인하세요</p>
        </div>
      </header>

      <section class="card" aria-label="로그인 폼">
        <div class="title">
          <h2>로그인</h2>
          <span>데모 UI (처리 없음)</span>
        </div>

        <div class="error" id="errorBox" role="alert" aria-live="polite" th:if="${param.error}" style="display: block">
          <strong>안내:</strong> 이 화면은 UI만 제공하며, 로그인 처리/검증은 연결되어 있지 않아요.
        </div>
        <div
          class="error"
          role="status"
          aria-live="polite"
          th:if="${param.logout}"
          style="display: block; border-color: rgba(34, 197, 94, 0.35); background: rgba(34, 197, 94, 0.1)"
        >
          <strong>Logged out:</strong> You have been signed out.
        </div>

        <form id="loginForm" th:action="@{/login}" method="post" novalidate>
          <label>
            <div class="label-row">
              <strong>아이디</strong>
              <span class="hint">예: honggildong</span>
            </div>
            <div class="field">
              <input
                id="username"
                name="username"
                type="text"
                inputmode="email"
                autocomplete="username"
                placeholder="아이디를 입력하세요"
                required
              />
            </div>
          </label>

          <label>
            <div class="label-row">
              <strong>비밀번호</strong>
              <a class="link" href="#" onclick="return false;">비밀번호 찾기</a>
            </div>
            <div class="field">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="비밀번호를 입력하세요"
                required
              />
              <button class="toggle" type="button" id="togglePw" aria-controls="password" aria-pressed="false">
                보기
              </button>
            </div>
          </label>

          <div class="row">
            <label class="check">
              <input type="checkbox" name="remember" />
              로그인 상태 유지
            </label>
            <a class="link" href="#" onclick="return false;">회원가입</a>
          </div>

          <button class="btn" type="submit">로그인</button>

          <div class="divider">또는</div>
          <div class="oauth" aria-label="간편 로그인(모양만)">
            <button class="ghost" type="button" onclick="return false;">Google로 계속</button>
            <button class="ghost" type="button" onclick="return false;">GitHub로 계속</button>
          </div>

          <p class="foot">
            계속 진행하면 <a href="#" onclick="return false;">이용약관</a> 및 <a href="#" onclick="return false;">개인정보 처리방침</a>에 동의하게 됩니다.
          </p>
        </form>
      </section>
    </main>

    <script>
      const togglePw = document.getElementById("togglePw");
      const password = document.getElementById("password");

      togglePw.addEventListener("click", () => {
        const showing = password.type === "text";
        password.type = showing ? "password" : "text";
        togglePw.textContent = showing ? "Show" : "Hide";
        togglePw.setAttribute("aria-pressed", String(!showing));
      });

    </script>
  </body>
</html>
