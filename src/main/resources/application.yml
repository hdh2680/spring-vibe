server:
  port: 8080

spring:
  application:
    name: springVibe

  datasource:
    url: jdbc:mysql://localhost:3306/springVibe?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: springVibe.dev.common.domain
  configuration:
    map-underscore-to-camel-case: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# SpringDoc Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    root: DEBUG
    springVibe: DEBUG

# App storage (attachments, exports, etc.)
# Can be overridden with env var: APP_STORAGE_ATTACHMENTS_DIR
app:
  storage:
    attachments-dir: ${APP_STORAGE_ATTACHMENTS_DIR:C:/workspace/data/attachments}

# External integrations (local-only hardcode allowed)
# NOTE: Do not commit real secrets. Prefer env var: ${YOUTUBE_API_KEY:}
integrations:
  youtube:
    api-key: "AIzaSyCwdR2_arOumtX4J10yh92RE1xU5qJ7sf0" # TODO: put your API key here for local testing (do not commit)

