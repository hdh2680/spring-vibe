server:
  port: 8080

spring:
  application:
    name: springVibe

  datasource:
    url: jdbc:mysql://localhost:3306/springVibe?useUnicode=true&characterEncoding=utf8&characterSetResults=utf8mb4&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: springVibe.dev.common.domain
  configuration:
    map-underscore-to-camel-case: true

# Actuator
management:
  health:
    elasticsearch:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# SpringDoc Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    root: INFO
    springVibe: INFO
# App storage (attachments, exports, etc.)
# Can be overridden with env var: APP_STORAGE_ATTACHMENTS_DIR
app:
  storage:
    attachments-dir: ${APP_STORAGE_ATTACHMENTS_DIR:C:/workspace/data/attachments}

# External integrations
# NOTE: Do not commit real secrets. Provide via env var (recommended): YOUTUBE_API_KEY
integrations:
  youtube:
    api-key: ${YOUTUBE_API_KEY:} # Empty means integration is not configured

# Local LLM (Ollama)
ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:qwen2.5:1.5b}


